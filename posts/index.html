<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posts | Runtime Notes</title>
    <meta
      name="description"
      content="Runtime Notes 글 목록. 개발 환경 설치와 버전 관리 문서를 운영체제별로 정리한다."
    />
    <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script defer src="../assets/js/site.js"></script>
    <script defer src="../assets/js/posts.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="../">Runtime Notes</a>
        <nav class="site-nav" aria-label="주요 메뉴">
          <a class="nav-link" href="../">Home</a>
          <a class="nav-link is-active" href="./">Posts</a>
          <a class="nav-link" href="../about/">About</a>
        </nav>
      </header>

      <main class="content-layout">
        <div class="content-main">
          <section class="page-intro">
            <p class="eyebrow">Archive</p>
            <h1>모든 글</h1>
            <p class="lead">
              운영체제별 설치 절차, 환경 변수 설정, 런타임 버전 전환 같은 내용을
              실무 기준으로 정리합니다.
            </p>
          </section>

          <section class="section-block">
            <div
              class="post-grid"
              data-post-list
              data-root="../"
              data-source="../posts.json"
              data-layout="grid"
              data-page-size="4"
            ></div>
            <div class="pagination-bar" data-post-pagination></div>
          </section>
        </div>

        <aside class="content-sidebar" aria-label="블로그 사이드바">
          <section class="content-card sidebar-card">
            <p class="eyebrow">Search</p>
            <div class="search-panel">
              <label class="search-label" for="posts-search">글 검색</label>
              <input
                id="posts-search"
                class="search-input"
                type="search"
                placeholder="제목, 요약, 태그 검색"
                data-post-search-input
              />
              <button class="search-clear" type="button" data-post-search-clear>
                초기화
              </button>
              <p class="filter-status" data-post-search-status></p>
            </div>
          </section>

          <section class="content-card sidebar-card">
            <p class="eyebrow">Categories</p>
            <div
              class="sidebar-list"
              data-section-list
              data-root="../"
              data-source="../posts.json"
            ></div>
          </section>

          <section class="content-card sidebar-card">
            <p class="eyebrow">Tags</p>
            <div
              class="tag-cloud"
              data-tag-list
              data-source="../posts.json"
              data-root="../"
            ></div>
          </section>

          <section class="content-card sidebar-card">
            <p class="eyebrow">Browse</p>
            <div class="sidebar-list">
              <a class="sidebar-link is-active" href="./">
                <span>전체 글</span>
              </a>
              <a class="sidebar-link" href="../about/">
                <span>About</span>
              </a>
            </div>
          </section>
        </aside>
      </main>

      <footer class="site-footer">
        <p>Runtime Notes</p>
        <p>&copy; <span data-current-year></span></p>
      </footer>
    </div>
  </body>
</html>
