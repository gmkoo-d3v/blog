<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로그래밍 | Runtime Notes</title>
    <meta
      name="description"
      content="언어, 문법, 구현 기록을 모아보는 Runtime Notes의 프로그래밍 탭"
    />
    <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script defer src="../assets/js/site.js"></script>
    <script defer src="../assets/js/posts.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="../">Runtime Notes</a>
        <nav class="site-nav" aria-label="주요 메뉴">
          <a class="nav-link" href="../">Home</a>
          <a class="nav-link" href="../posts/">Posts</a>
          <a class="nav-link" href="../about/">About</a>
        </nav>
      </header>

      <main class="content-layout">
        <div class="content-main">
          <section class="page-intro">
            <p class="eyebrow">Programming</p>
            <h1>프로그래밍 관련 글</h1>
            <p class="lead">
              언어 문법, 구현 과정, 코드 중심 정리를 모아두는 탭으로 사용할 예정이다.
            </p>
          </section>

          <section class="section-block">
            <div
              class="post-grid"
              data-post-list
              data-root="../"
              data-source="../posts.json"
              data-layout="grid"
              data-page-size="4"
              data-filter-key="sectionSlug"
              data-filter-value="programming"
              data-empty-title="아직 프로그래밍 글이 없습니다."
              data-empty-summary="프로그래밍 관련 글을 추가하면 이 탭에 자동으로 표시됩니다."
            ></div>
            <div class="pagination-bar" data-post-pagination></div>
          </section>
        </div>

        <aside class="content-sidebar" aria-label="블로그 사이드바">
          <section class="content-card sidebar-card">
            <p class="eyebrow">Search</p>
            <div class="search-panel">
              <label class="search-label" for="programming-search">프로그래밍 글 검색</label>
              <input
                id="programming-search"
                class="search-input"
                type="search"
                placeholder="제목, 요약, 태그 검색"
                data-post-search-input
              />
              <button class="search-clear" type="button" data-post-search-clear>
                초기화
              </button>
              <p class="filter-status" data-post-search-status></p>
            </div>
          </section>

          <section class="content-card sidebar-card">
            <p class="eyebrow">Categories</p>
            <div
              class="sidebar-list"
              data-section-list
              data-root="../"
              data-source="../posts.json"
              data-active-section="programming"
              data-static-sections="infra:Infra,programming:Programming,db:DB,os-settings:OS Settings"
            ></div>
          </section>

          <section class="content-card sidebar-card">
            <p class="eyebrow">Tags</p>
            <div
              class="tag-cloud"
              data-tag-list
              data-source="../posts.json"
              data-root="../"
              data-filter-key="sectionSlug"
              data-filter-value="programming"
            ></div>
          </section>

          <section class="content-card sidebar-card">
            <p class="eyebrow">Browse</p>
            <div class="sidebar-list">
              <a class="sidebar-link" href="../posts/">
                <span>전체 글</span>
              </a>
              <a class="sidebar-link" href="../about/">
                <span>About</span>
              </a>
            </div>
          </section>
        </aside>
      </main>

      <footer class="site-footer">
        <p>Runtime Notes</p>
        <p>&copy; <span data-current-year></span></p>
      </footer>
    </div>
  </body>
</html>
